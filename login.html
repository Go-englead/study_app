<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>ログイン｜学習管理アプリ</title>
  <style>
    /* ===== デザイントークン（index.htmlと統一） ===== */
    :root {
      /* === Primary === */
      --color-primary:        #1A5276;
      --color-primary-light:  #2E86C1;
      --color-primary-dark:   #0E3860;

      /* === Accent === */
      --color-accent:         #27AE60;

      /* === Neutral === */
      --color-bg:             #FFFFFF;
      --color-bg-soft:        #F4F6F8;
      --color-border:         #D5D8DC;

      /* === Text === */
      --color-text-primary:   #1C2833;
      --color-text-secondary: #566573;
      --color-text-muted:     #ABB2B9;
      --color-text-inverse:   #FFFFFF;

      /* === Semantic === */
      --color-error:          #E74C3C;

      /* === Font === */
      --font-primary: 'Noto Sans JP', 'Hiragino Kaku Gothic ProN', sans-serif;

      /* === Font Sizes === */
      --text-xs:   0.75rem;
      --text-sm:   0.875rem;
      --text-base: 1rem;
      --text-lg:   1.125rem;
      --text-xl:   1.25rem;
      --text-2xl:  1.5rem;

      /* === Font Weights === */
      --font-medium:    500;
      --font-semibold:  600;
      --font-bold:      700;
      --font-extrabold: 800;

      /* === Line heights === */
      --leading-tight:  1.25;
      --leading-normal: 1.6;

      /* === Spacing === */
      --space-2: 0.5rem;
      --space-3: 0.75rem;
      --space-4: 1rem;
      --space-5: 1.25rem;
      --space-6: 1.5rem;
      --space-8: 2rem;

      /* === Transitions === */
      --transition-fast: 0.15s ease;
      --transition-base: 0.2s ease;
    }

    /* ===== 基本スタイル ===== */
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      font-family: var(--font-primary);
      background: linear-gradient(135deg, var(--color-bg-soft) 0%, #E8EEF3 100%);
      color: var(--color-text-primary);
      min-height: 100vh;
      font-size: var(--text-base);
      line-height: var(--leading-normal);
      display: flex;
      align-items: center;
      justify-content: center;
      padding: var(--space-4);
    }
    button { font-family: inherit; cursor: pointer; }

    /* フォーカスリング */
    :focus-visible {
      outline: 3px solid var(--color-primary-light);
      outline-offset: 2px;
    }

    /* ===== ログインカード ===== */
    .login-card {
      background: var(--color-bg);
      border-radius: 12px;
      border: 1px solid var(--color-border);
      padding: var(--space-8) var(--space-6);
      box-shadow: 0 4px 16px rgba(0, 0, 0, 0.08);
      width: 100%;
      max-width: 400px;
    }

    /* ===== ロゴ・ヘッダー ===== */
    .login-header {
      text-align: center;
      margin-bottom: var(--space-6);
    }
    .login-logo {
      width: 56px;
      height: 56px;
      border-radius: 50%;
      background: linear-gradient(135deg, var(--color-primary), var(--color-primary-dark));
      display: flex;
      align-items: center;
      justify-content: center;
      margin: 0 auto var(--space-3);
      font-size: var(--text-xl);
      font-weight: var(--font-bold);
      color: var(--color-text-inverse);
      box-shadow: 0 4px 12px rgba(26, 82, 118, 0.25);
    }
    .login-title {
      font-size: var(--text-lg);
      font-weight: var(--font-bold);
      color: var(--color-primary-dark);
      margin-bottom: 4px;
    }
    .login-sub {
      font-size: var(--text-xs);
      color: var(--color-text-secondary);
    }

    /* ===== フォーム ===== */
    .form-group {
      margin-bottom: var(--space-4);
    }
    .form-label {
      display: block;
      font-size: var(--text-xs);
      font-weight: var(--font-bold);
      color: var(--color-text-secondary);
      letter-spacing: 0.06em;
      margin-bottom: 6px;
      text-transform: uppercase;
    }
    .form-input {
      width: 100%;
      padding: var(--space-3);
      font-size: var(--text-base);
      border: 1.5px solid var(--color-border);
      border-radius: 6px;
      background: var(--color-bg);
      color: var(--color-text-primary);
      outline: none;
      transition: border-color var(--transition-fast), box-shadow var(--transition-fast);
      font-family: inherit;
    }
    .form-input:focus {
      border-color: var(--color-primary-light);
      box-shadow: 0 0 0 3px rgba(46, 134, 193, 0.15);
    }

    /* ===== ログインボタン ===== */
    .login-btn {
      background: var(--color-primary);
      color: var(--color-text-inverse);
      border: 2px solid transparent;
      border-radius: 4px;
      padding: var(--space-3) var(--space-8);
      font-size: var(--text-base);
      font-weight: var(--font-semibold);
      width: 100%;
      min-height: 48px;
      margin-top: var(--space-2);
      transition: all var(--transition-base);
    }
    .login-btn:hover {
      background: var(--color-primary-light);
      transform: translateY(-1px);
      box-shadow: 0 4px 12px rgba(26, 82, 118, 0.3);
    }
    .login-btn:active { transform: translateY(0); }

    /* ===== エラーメッセージ ===== */
    .error-msg {
      display: none;
      background: #FDEDEC;
      border: 1px solid #F5B7B1;
      border-radius: 6px;
      padding: var(--space-3);
      font-size: 13px;
      color: var(--color-error);
      margin-bottom: var(--space-4);
      text-align: center;
    }
    .error-msg.show { display: block; }

  </style>
</head>
<body>
  <div class="login-card">
    <!-- ヘッダー -->
    <div class="login-header">
      <div class="login-logo">学</div>
      <div class="login-title">学習管理アプリ</div>
      <div class="login-sub">アカウント情報を入力してください</div>
    </div>

    <!-- エラーメッセージ -->
    <div class="error-msg" id="error-msg">
      IDまたはパスワードが正しくありません
    </div>

    <!-- ログインフォーム -->
    <form id="login-form" onsubmit="handleLogin(event)">
      <div class="form-group">
        <label class="form-label" for="user-id">メールアドレス または 会員ID</label>
        <input type="text" id="user-id" class="form-input" autocomplete="username" required>
      </div>
      <div class="form-group">
        <label class="form-label" for="password">パスワード</label>
        <input type="password" id="password" class="form-input" autocomplete="current-password" required>
      </div>
      <button type="submit" class="login-btn">ログイン</button>
    </form>
  </div>

  <script>
    // ===== スタッフマスター（CSVから読み込み） =====
    // 注：file:// で開いた場合は fetch が失敗するため、フォールバック用のインラインデータを使用
    let staffList = [];

    // CSVテキストを配列にパース
    function parseCSV(text) {
      const lines = text.trim().split(/\r?\n/);
      const headers = lines[0].split(',').map(h => h.trim());
      return lines.slice(1).map(line => {
        const values = line.split(',');
        const obj = {};
        headers.forEach((h, i) => {
          obj[h] = (values[i] || '').replace(/[​-‏﻿]/g, '').trim();
        });
        return obj;
      });
    }

    // フォールバック用インラインCSV（file:// でfetch失敗時に使用）
    const fallbackStaffCSV = `id,name,role,iconUrl,meetUrl,groupContent,email,password
MW044,Go,Coach,,,,go.tsukino@englead.jp,coach1`;

    // staff.csv ロード処理
    async function loadStaff() {
      try {
        const res = await fetch('./data/staff.csv');
        if (!res.ok) throw new Error('CSV fetch failed: ' + res.status);
        const text = await res.text();
        staffList = parseCSV(text);
        console.log('👥 スタッフマスター：CSVから読み込み完了', staffList.length, '件');
      } catch (e) {
        staffList = parseCSV(fallbackStaffCSV);
        console.warn('⚠️ スタッフマスター：CSV読み込み失敗、フォールバックを使用', e.message);
      }
    }

    // ページ読み込み時に staff.csv を読み込んでおく
    loadStaff();

    // ログイン処理
    function handleLogin(event) {
      event.preventDefault();
      const id = document.getElementById('user-id').value.trim();
      const pw = document.getElementById('password').value;
      const errorMsg = document.getElementById('error-msg');

      // --- 会員ログイン（member / study2026）----
      if (id === 'member' && pw === 'study2026') {
        window.location.href = 'index.html';
        return;
      }

      // --- スタッフログイン（staff.csv のメールアドレス＋パスワード）----
      // メールアドレスの大文字小文字は区別しない
      const staff = staffList.find(s =>
        s.email.toLowerCase() === id.toLowerCase() && s.password === pw
      );
      if (staff) {
        const roleLower = (staff.role || '').toLowerCase();
        // coach / teacher のみ admin.html へ遷移
        if (roleLower === 'coach' || roleLower === 'teacher') {
          // sessionStorage にログイン中スタッフ情報を保存
          sessionStorage.setItem('currentStaff', JSON.stringify({
            id: staff.id,
            name: staff.name,
            role: staff.role,
            email: staff.email
          }));
          window.location.href = 'admin.html';
          return;
        } else {
          // 役割が対応外
          errorMsg.textContent = 'このアカウントはまだ対応していません（役割：' + staff.role + '）';
          errorMsg.classList.add('show');
          return;
        }
      }

      // --- ログイン失敗 ----
      errorMsg.textContent = 'メールアドレスまたはパスワードが正しくありません';
      errorMsg.classList.add('show');
    }
  </script>
</body>
</html>
